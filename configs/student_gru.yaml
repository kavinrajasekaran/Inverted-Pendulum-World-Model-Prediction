seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: true       # GRU hidden state threads through the entire rollout,
                      # giving the model memory to self-correct accumulated drift.

training:
  batch_size: 512
  updates: 20000
  smoke_updates: 200
  train_sequence_length: 320
  learning_rate: 3.0e-4
  grad_clip_norm: 1.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 64
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0
  rollout_weight: 4.0
  rollout_min_horizon: 16
  rollout_train_horizon: 200
  rollout_noise_sigma: 0.01
  obs_noise_sigma: 0.004

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
