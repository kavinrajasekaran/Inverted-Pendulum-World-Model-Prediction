seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: false

training:
  batch_size: 512
  updates: 20000
  smoke_updates: 200
  train_sequence_length: 320
  # 5e-4 (v1) oscillated; 1.5e-4 was too slow.  3e-4 is the sweet spot.
  learning_rate: 3.0e-4
  grad_clip_norm: 1.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 64
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0
  rollout_weight: 4.0
  # Curriculum range: every update samples a horizon between min and max.
  rollout_min_horizon: 16
  rollout_train_horizon: 200
  # Reflection data augmentation: each batch, ~50% of windows are reflected.
  # Combined with the bias-free linear prior in model.py this prevents the
  # model from learning the one-directional drift that v1 exhibited.
  symmetry_flip_probability: 0.5
  # Scheduled-sampling noise on rolled-out states.
  rollout_noise_sigma: 0.008
  # Small input noise on the one-step loss for OOD robustness.
  obs_noise_sigma: 0.004

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
