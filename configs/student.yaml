seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 3
  use_gru: false

training:
  # The public scoreboard data has 1010-step windows, so we can afford long
  # training rollouts. batch_size 256 keeps the activations of long unrolls
  # inside an A100 / T4 memory budget.
  batch_size: 256
  updates: 12000
  smoke_updates: 200
  train_sequence_length: 320
  learning_rate: 5.0e-4
  grad_clip_norm: 1.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 500
  max_val_windows: 64
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 1.0
  rollout_weight: 4.0
  # Curriculum range: every update samples a horizon between min and max.
  # This forces stability at every horizon length up to 200.
  rollout_min_horizon: 16
  rollout_train_horizon: 200
  # Scheduled-sampling: small noise on rolled-out states so the model learns
  # to recover from its own accumulated errors.
  rollout_noise_sigma: 0.01
  # Robustness noise on the one-step input observation.
  obs_noise_sigma: 0.005

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
