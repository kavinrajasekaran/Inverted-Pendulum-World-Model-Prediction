seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 384
  num_layers: 4
  use_gru: false

training:
  batch_size: 512
  updates: 5000
  smoke_updates: 180
  train_sequence_length: 110
  learning_rate: 3.0e-4
  grad_clip_norm: 5.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 300
  max_val_windows: 64
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 0.5
  rollout_weight: 3.0
  rollout_train_horizon: 70

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
